spring.application.name=sistema-colegio

# ── Base de datos (cambia estos valores con los de Render en producción) ──
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/colegio_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──
jwt.secret=${JWT_SECRET:clave-secreta-sistema-colegio-2026-min32chars!!}
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=86400000

# ── Puerto (Render usa variable PORT) ──
server.port=${PORT:8080}
